version: '3.8'

services:
  antenna-postgres:
    image: postgres:16-alpine
    container_name: antenna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: antenna
      POSTGRES_PASSWORD: antenna_secure_pass
      POSTGRES_DB: antenna
    volumes:
      - antenna-postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antenna"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - antenna-network

  antenna-web:
    image: r13xr/antenna-web:latest
    container_name: antenna-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://antenna:antenna_secure_pass@antenna-postgres:5432/antenna
      - NEXT_PUBLIC_P2P_ENABLED=true
      - NEXT_PUBLIC_NODE_ID=${NODE_ID:-local-node}
      - NEXT_PUBLIC_NODE_NAME=${NODE_NAME:-Antenna Node}
      - NEXT_PUBLIC_TOR_ADDRESS=${TOR_ADDRESS:-}
    ports:
      - "3000:3000"
    depends_on:
      antenna-postgres:
        condition: service_healthy
    networks:
      - antenna-network

  antenna-gateway:
    image: r13xr/antenna:latest
    container_name: antenna-gateway
    restart: unless-stopped
    ports:
      - "18790:18790"
      - "18792:18792"
    volumes:
      - antenna-workspace:/root/.antenna/workspace
      - antenna-config:/root/.antenna
    environment:
      - ANTENNA_P2P_ENABLED=true
      - ANTENNA_P2P_PORT=18792
      - ANTENNA_NODE_TYPE=${NODE_TYPE:-full}
      - ANTENNA_NODE_NAME=${NODE_NAME:-Antenna Node}
      - ANTENNA_BOOTSTRAP_NODES=${BOOTSTRAP_NODES:-antenna.social:18792}
      - ANTENNA_DATABASE_URL=postgresql://antenna:antenna_secure_pass@antenna-postgres:5432/antenna
    command: ["gateway", "--p2p"]
    depends_on:
      antenna-postgres:
        condition: service_healthy
    networks:
      - antenna-network

  antenna-tor:
    image: goldy/tor-hidden-service:latest
    container_name: antenna-tor
    restart: unless-stopped
    environment:
      - SERVICE1_TOR_SERVICE_HOSTS=80:antenna-web:3000,18792:antenna-gateway:18792
      - SERVICE1_TOR_SERVICE_VERSION=3
    volumes:
      - antenna-tor-keys:/var/lib/tor/hidden_service
    depends_on:
      - antenna-web
      - antenna-gateway
    networks:
      - antenna-network

  antenna-nginx:
    image: nginx:alpine
    container_name: antenna-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - antenna-ssl:/etc/nginx/ssl
    depends_on:
      - antenna-web
      - antenna-gateway
    networks:
      - antenna-network

volumes:
  antenna-postgres-data:
  antenna-workspace:
  antenna-config:
  antenna-tor-keys:
  antenna-ssl:

networks:
  antenna-network:
    driver: bridge
