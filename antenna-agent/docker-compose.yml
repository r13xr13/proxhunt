services:
  # ─────────────────────────────────────────────
  # Antenna Agent (one-shot query)
  #   docker compose run --rm antenna-agent -m "Hello"
  # ─────────────────────────────────────────────
  antenna-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antenna-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/home/antenna/.antenna/config.json:ro
      - antenna-workspace:/home/antenna/.antenna/workspace
    entrypoint: ["antenna", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Antenna Gateway (Long-running Bot)
  #   docker compose up antenna-gateway
  # ─────────────────────────────────────────────
  antenna-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antenna-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/home/antenna/.antenna/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - antenna-workspace:/home/antenna/.antenna/workspace
    command: ["gateway"]

volumes:
  antenna-workspace:
