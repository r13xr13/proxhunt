<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect fill="#0d1117" width="800" height="400"/>
  <text x="400" y="40" fill="#58a6ff" font-family="monospace" font-size="24" text-anchor="middle">THE OLD WAY vs WITH ANTENNA</text>
  
  <!-- Left side - Old way -->
  <rect x="20" y="70" width="360" height="280" fill="#161b22" rx="10"/>
  <text x="200" y="100" fill="#f85149" font-family="monospace" font-size="18" text-anchor="middle">THE OLD WAY</text>
  
  <text x="40" y="140" fill="#8b949e" font-family="monospace" font-size="14">❌ 100MB+ RAM usage</text>
  <text x="40" y="170" fill="#8b949e" font-family="monospace" font-size="14">❌ 30+ second startup</text>
  <text x="40" y="200" fill="#8b949e" font-family="monospace" font-size="14">❌ Centralized (failure point)</text>
  <text x="40" y="230" fill="#8b949e" font-family="monospace" font-size="14">❌ Data on third-party servers</text>
  <text x="40" y="260" fill="#8b949e" font-family="monospace" font-size="14">❌ No monetization</text>
  <text x="40" y="290" fill="#8b949e" font-family="monospace" font-size="14">❌ Locked into one provider</text>
  <text x="40" y="320" fill="#8b949e" font-family="monospace" font-size="14">❌ Expensive API calls</text>
  
  <!-- Right side - Antenna -->
  <rect x="420" y="70" width="360" height="280" fill="#161b22" rx="10"/>
  <text x="600" y="100" fill="#3fb950" font-family="monospace" font-size="18" text-anchor="middle">WITH ANTENNA</text>
  
  <text x="440" y="140" fill="#3fb950" font-family="monospace" font-size="14">✅ &lt;10MB RAM ($10 hardware)</text>
  <text x="440" y="170" fill="#3fb950" font-family="monospace" font-size="14">✅ &lt;1 second startup</text>
  <text x="440" y="200" fill="#3fb950" font-family="monospace" font-size="14">✅ Fully decentralized P2P</text>
  <text x="440" y="230" fill="#3fb950" font-family="monospace" font-size="14">✅ E2E encrypted, local-first</text>
  <text x="440" y="260" fill="#3fb950" font-family="monospace" font-size="14">✅ Earn XMR with skills</text>
  <text x="440" y="290" fill="#3fb950" font-family="monospace" font-size="14">✅ Your agent, your rules</text>
  <text x="440" y="320" fill="#3fb950" font-family="monospace" font-size="14">✅ Runs everywhere</text>
</svg>
