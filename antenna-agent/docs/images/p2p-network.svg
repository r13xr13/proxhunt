<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect fill="#0d1117" width="800" height="450"/>
  <text x="400" y="30" fill="#58a6ff" font-family="monospace" font-size="20" text-anchor="middle">P2P NETWORK</text>
  
  <!-- Bootstrap Server -->
  <rect x="325" y="60" width="150" height="50" fill="#f78166" rx="8"/>
  <text x="400" y="90" fill="#fff" font-family="monospace" font-size="14" text-anchor="middle">Bootstrap Server</text>
  
  <!-- Connection lines from bootstrap -->
  <line x1="400" y1="110" x2="150" y2="180" stroke="#238636" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="400" y1="110" x2="400" y2="180" stroke="#238636" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="400" y1="110" x2="650" y2="180" stroke="#238636" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Node 1 -->
  <circle cx="150" cy="200" r="40" fill="#1f6feb" stroke="#58a6ff" stroke-width="3"/>
  <text x="150" y="205" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle">Node</text>
  <text x="150" y="220" fill="#fff" font-family="monospace" font-size="10" text-anchor="middle">#1</text>
  
  <!-- Node 2 -->
  <circle cx="400" cy="200" r="40" fill="#1f6feb" stroke="#58a6ff" stroke-width="3"/>
  <text x="400" y="205" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle">Node</text>
  <text x="400" y="220" fill="#fff" font-family="monospace" font-size="10" text-anchor="middle">#2</text>
  
  <!-- Node 3 -->
  <circle cx="650" cy="200" r="40" fill="#1f6feb" stroke="#58a6ff" stroke-width="3"/>
  <text x="650" y="205" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle">Node</text>
  <text x="650" y="220" fill="#fff" font-family="monospace" font-size="10" text-anchor="middle">#3</text>
  
  <!-- Mesh connections -->
  <line x1="190" y1="200" x2="360" y2="200" stroke="#238636" stroke-width="2"/>
  <line x1="440" y1="200" x2="610" y2="200" stroke="#238636" stroke-width="2"/>
  <line x1="165" y1="225" x2="325" y2="320" stroke="#238636" stroke-width="2"/>
  <line x1="635" y1="225" x2="475" y2="320" stroke="#238636" stroke-width="2"/>
  
  <!-- Node 4 -->
  <circle cx="325" cy="340" r="40" fill="#238636" stroke="#3fb950" stroke-width="3"/>
  <text x="325" y="345" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle">Node</text>
  <text x="325" y="360" fill="#fff" font-family="monospace" font-size="10" text-anchor="middle">#4</text>
  
  <!-- Node 5 - Gateway -->
  <circle cx="475" cy="340" r="40" fill="#a371f7" stroke="#d2a8ff" stroke-width="3"/>
  <text x="475" y="345" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle">Node</text>
  <text x="475" y="360" fill="#fff" font-family="monospace" font-size="10" text-anchor="middle">#5</text>
  <text x="475" y="400" fill="#a371f7" font-family="monospace" font-size="10" text-anchor="middle">(Gateway)</text>
  
  <!-- Connection to gateway -->
  <line x1="365" y1="340" x2="435" y2="340" stroke="#238636" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="150" y="270" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">File Transfer</text>
  <text x="400" y="270" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">Skill Sharing</text>
  <text x="650" y="270" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">Agent Swarms</text>
  
  <!-- Features box -->
  <rect x="250" y="395" width="300" height="40" fill="#161b22" rx="6"/>
  <text x="400" y="420" fill="#3fb950" font-family="monospace" font-size="12" text-anchor="middle">✅ No Central Server • Auto Discovery • E2E Encrypted</text>
</svg>
