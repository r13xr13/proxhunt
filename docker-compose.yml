services:
  # Conflict Globe Web Application
  web:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REACT_APP_CESIUM_ION_TOKEN=${CESIUM_ION_TOKEN:-}
      - ANTENNA_GATEWAY_URL=http://antenna-agent:18790
    restart: unless-stopped
    depends_on:
      - antenna-agent
    networks:
      - conflict-globe

  # Antenna Agent - AI Agent Framework
  antenna-agent:
    build:
      context: ./antenna-agent
      dockerfile: Dockerfile
    container_name: antenna-agent
    ports:
      - "18790:18790"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o}
    volumes:
      - antenna-data:/root/.antenna
    restart: unless-stopped
    networks:
      - conflict-globe

  # Discord Bot - AI-powered OSINT notifications
  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    container_name: conflict-globe-discord
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - discord-data:/app
    restart: unless-stopped
    networks:
      - conflict-globe

networks:
  conflict-globe:
    driver: bridge

volumes:
  antenna-data:
  discord-data:
