services:
  # Conflict Globe Web Application
  web:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REACT_APP_CESIUM_ION_TOKEN=${CESIUM_ION_TOKEN:-}
      # Antenna Agent Gateway URL (optional - for AI agent integration)
      # Set ANTENNA_GATEWAY_URL in .env to connect to external Antenna agent
      # Example: ANTENNA_GATEWAY_URL=http://host.docker.internal:18790
      - ANTENNA_GATEWAY_URL=${ANTENNA_GATEWAY_URL:-}
    restart: unless-stopped
    networks:
      - conflict-globe

networks:
  conflict-globe:
    driver: bridge
