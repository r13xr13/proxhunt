services:
  server:
    build: .
    container_name: proxhunt-server
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./proxhunt.db:/app/server/proxhunt.db
    restart: unless-stopped

  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    container_name: proxhunt-discord-bot
    ports:
      - "3001:3001"
    env_file:
      - discord-bot/.env
    environment:
      - PROXHUNT_API=http://server:8080
    restart: on-failure:3
    profiles:
      - bot

networks:
  default:
    driver: bridge