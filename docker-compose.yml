services:
  # Conflict Globe Web Application
  web:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REACT_APP_CESIUM_ION_TOKEN=${CESIUM_ION_TOKEN:-}
      - ANTENNA_GATEWAY_URL=${ANTENNA_GATEWAY_URL:-http://localhost:18790}
    restart: unless-stopped
    networks:
      - conflict-globe

  # Discord Bot - AI-powered OSINT notifications
  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    container_name: conflict-globe-discord
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CONFLICT_GLOBE_API=${CONFLICT_GLOBE_API:-http://web:8080/api/conflicts}
    volumes:
      - discord-data:/app
    restart: unless-stopped
    networks:
      - conflict-globe

networks:
  conflict-globe:
    driver: bridge

volumes:
  discord-data:
